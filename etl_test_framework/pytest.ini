[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    data_quality: Data quality validations (nulls, duplicates, formats)
    completeness: Row count and column completeness checks
    schema: Schema and DDL validation tests
    transformation: Business transformation rule validations
    smoke: Quick smoke tests
    regression: Full regression suite
    critical: Critical path tests

addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/etl_test_report.html
    --self-contained-html
    -p no:warnings

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
